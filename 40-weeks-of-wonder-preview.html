    // ─── Main Component ───────────────────────────────────────────────────────────
    function FortyWeeksOfWonder() {
      const [counterWeek, setCounterWeek]         = useState(1);
      const [email, setEmail]                     = useState("");
      const [dueDate, setDueDate]                 = useState("");
      const [submitted, setSubmitted]             = useState(false);
      const [footerEmail, setFooterEmail]         = useState("");
      const [footerSubmitted, setFooterSubmitted] = useState(false);
      const [visibleIds, setVisibleIds]           = useState(new Set());
      const [isPlaying, setIsPlaying]             = useState(false);
      const [hoveredNode, setHoveredNode]         = useState(null);

      useEffect(() => {
        const id = setInterval(() => {
          setCounterWeek(p => (p >= 40 ? 1 : p + 1));
        }, 320);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduced) {
          document.querySelectorAll("[data-animate]").forEach(el => {
            if (el.id) setVisibleIds(p => new Set([...p, el.id]));
          });
          return;
        }
        const obs = new IntersectionObserver(
          entries => {
            entries.forEach(e => {
              if (e.isIntersecting && e.target.id) {
                setVisibleIds(p => new Set([...p, e.target.id]));
              }
            });
          },
          { threshold: 0.08, rootMargin: "0px 0px -40px 0px" }
        );
        document.querySelectorAll("[data-animate]").forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);

      const vis = (id: string) => visibleIds.has(id);
      const anim = (id: string, extra = "") =>
        `transition-all duration-700 ease-out ${extra} ${vis(id) ? "opacity-100 translate-y-0" : "opacity-0 translate-y-8"}`;

      const scrollTo = (id: string) =>
        document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

            @keyframes pulse-ring   { 0%,100% { transform: scale(1); opacity: .6; } 50% { transform: scale(1.08); opacity: .25; } }
            @keyframes counter-pop  { 0% { transform: scale(.8); opacity: 0; } 60% { transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }
            .animate-float      { animation: float-gentle 4s ease-in-out infinite; }
            .animate-pulse-ring { animation: pulse-ring   3s ease-in-out infinite; }
            .counter-num        { animation: counter-pop  .22s ease-out; }
            @media (prefers-reduced-motion: reduce) { .animate-float, .animate-pulse-ring { animation: none; } }
            .tl-scroll::-webkit-scrollbar       { height: 4px; }
            .tl-scroll::-webkit-scrollbar-track { background: transparent; }
            .tl-scroll::-webkit-scrollbar-thumb { background: #e8c4b8; border-radius: 2px; }
            .focus-warm:focus-visible { outline: 2px solid #c4785a; outline-offset: 3px; }
            .focus-teal:focus-visible { outline: 2px solid #2d6e6e; outline-offset: 3px; }
            * { box-sizing: border-box; }
          `}</style>

            {/* §1 HERO */}

                    const weeks = weekNodes.filter(w => w.trimester === trim);
                    const c = T[trim];
                    return (
                      <div key={trim} className="flex flex-col">

                                style={wk.unlocked ? {background:c.dot,borderColor:c.dot} : {}}
                                aria-label={`Week ${wk.week}: ${wk.label}${wk.unlocked ? "" : " (locked)"}`}
                                onMouseEnter={() => setHoveredNode(wk.week)}
                                onMouseLeave={() => setHoveredNode(null)}
                                onClick={() => !wk.unlocked && scrollTo("email-capture")}

                                {wk.unlocked
                                  ? <span className="ff-body text-sm font-bold">{wk.week}</span>

                                }
                                {wk.week === 12 && <span className="absolute -top-1.5 -right-1.5 w-3.5 h-3.5 rounded-full border-2 border-white" style={{background:"#2d6e6e"}} />}

                  <div>
                    <div className="relative w-full rounded-2xl overflow-hidden shadow-2xl" style={{paddingBottom:"56.25%",background:"linear-gradient(135deg,#2c1f1a 0%,#1a2e2e 100%)"}}>
                      <div className="absolute inset-0 bg-gradient-to-br from-[#c4785a]/18 via-transparent to-[#2d6e6e]/18" />
                      <svg className="absolute inset-0 w-full h-full opacity-[0.12]" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
                        <ellipse cx="620" cy="90" rx="220" ry="300" fill="#c4785a" transform="rotate(-18 620 90)" />
                        <ellipse cx="80" cy="370" rx="190" ry="260" fill="#2d6e6e" transform="rotate(14 80 370)" />
                      </svg>

                      <div className="absolute inset-0 flex items-center justify-center">
                        <button onClick={() => setIsPlaying(p => !p)} aria-label={isPlaying ? "Pause" : "Play"} className="focus-warm w-[72px] h-[72px] md:w-20 md:h-20 rounded-full bg-white/88 backdrop-blur-sm flex items-center justify-center shadow-2xl hover:scale-110 transition-all duration-200 cursor-pointer">
                          {isPlaying
                            ? <svg viewBox="0 0 24 24" fill="#c4785a" className="w-8 h-8"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                            : <svg viewBox="0 0 24 24" fill="#c4785a" className="w-8 h-8 ml-1"><path d="M8 5v14l11-7z"/></svg>
                          }
                        </button>
                      </div>

                      <div className="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-black/80 via-black/40 to-transparent">
                        <div className="flex items-end justify-between gap-3 mb-3">
                          <div>
                            <div className="flex items-center gap-2 mb-1.5">
                              <span className="px-2.5 py-0.5 rounded-full bg-[#c4785a] text-white ff-body text-xs font-semibold">Trimester 1</span>
                              <span className="px-2.5 py-0.5 rounded-full bg-white/18 text-white ff-body text-xs">Week 12</span>
                            </div>
                            <h3 className="ff-display text-white text-lg md:text-xl font-medium">"Your Baby is the Size of a Lime"</h3>
                          </div>
                          <span className="ff-body text-white/75 text-sm tabular-nums">4:32</span>
                        </div>
                        <div className="h-1 bg-white/20 rounded-full overflow-hidden">
                          <div className="h-full w-1/3 rounded-full" style={{background:"#c4785a"}} />
                        </div>
                      </div>
                    </div>

                    <div className="mt-5 grid grid-cols-2 sm:grid-cols-4 gap-2.5">
                      {[{time:"0:00",label:"Baby Development"},{time:"1:15",label:"Your Body This Week"},{time:"2:40",label:"Nutrition Tip"},{time:"3:30",label:"Partner Corner"}].map((ch,i) => (
                        <button key={i} className="focus-warm flex flex-col items-start p-3 rounded-xl bg-white border border-[#f0e8e4] hover:border-[#c4785a]/40 hover:shadow-md transition-all duration-200 cursor-pointer text-left min-h-[52px]">
                          <span className="ff-body text-xs font-bold text-[#c4785a] tabular-nums">{ch.time}</span>
                          <span className="ff-body text-xs text-[#5a4a44] mt-1 leading-tight">{ch.label}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h4 className="ff-body text-xs font-semibold tracking-[0.2em] uppercase text-[#9a8a85] mb-5">Watch Next</h4>
                    <div className="flex flex-col gap-3">
                      {[{week:13,title:"End of Trimester 1",dur:"5:10",t:1},{week:14,title:"Welcome to Trimester 2",dur:"4:48",t:2},{week:15,title:"Your Anatomy Scan",dur:"6:02",t:2}].map((ep,i) => (
                        <button key={i} onClick={() => scrollTo("email-capture")} className="focus-warm flex gap-3 p-3.5 rounded-xl bg-white border border-[#f0e8e4] hover:border-[#c4785a]/35 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 cursor-pointer text-left">
                          <div className="w-16 h-12 rounded-lg flex-shrink-0 flex items-center justify-center text-white ff-body text-xs font-bold" style={{background:ep.t===1?"linear-gradient(135deg,#c4785a,#e8a88c)":ep.t===2?"linear-gradient(135deg,#b5852a,#d4a84e)":"linear-gradient(135deg,#2d6e6e,#4a9999)"}}>W{ep.week}</div>
                          <div className="flex flex-col justify-center min-w-0">
                            <p className="ff-body text-xs font-semibold text-[#c4785a]">Week {ep.week}</p>
                            <p className="ff-body text-sm text-[#2c2c2c] leading-snug truncate">{ep.title}</p>
                            <p className="ff-body text-xs text-[#9a8a85] mt-1 tabular-nums">{ep.dur}</p>
                          </div>
                        </button>
                      ))}
                    </div>
                    <button onClick={() => scrollTo("email-capture")} className="focus-warm mt-5 w-full min-h-[44px] py-3 rounded-xl border-2 border-dashed border-[#e8ddd8] ff-body text-sm text-[#9a8a85] hover:border-[#c4785a]/40 hover:text-[#c4785a] transition-all duration-200 cursor-pointer">
                      Unlock all 37 more episodes &rarr;
                    </button>
                  </div>
                </div>
              </div>
            </section>

            {/* §4 EMAIL CAPTURE */}
            <section id="email-capture" className="py-28 px-6 relative overflow-hidden" style={{background:"linear-gradient(135deg,#2c1f1a 0%,#1a2e2e 55%,#2c1f1a 100%)"}}>
              <div className="absolute inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
                <svg className="absolute -top-12 -left-12 w-72 h-72 opacity-[0.09]" viewBox="0 0 300 300"><ellipse cx="150" cy="150" rx="145" ry="185" fill="#c4785a" transform="rotate(-22 150 150)"/></svg>
                <svg className="absolute -bottom-16 -right-16 w-96 h-96 opacity-[0.09]" viewBox="0 0 320 320"><ellipse cx="160" cy="160" rx="165" ry="135" fill="#2d6e6e" transform="rotate(28 160 160)"/></svg>
              </div>

              <div className="relative z-10 max-w-xl mx-auto text-center">
                <div id="cap-content" data-animate className={anim("cap-content")}>
                  <p className="ff-body text-xs font-semibold tracking-[0.22em] uppercase text-[#c4785a] mb-5">Begin Your Journey</p>
                  <h2 className="ff-display text-3xl md:text-5xl font-medium text-white mb-6 leading-tight">
                    Unlock Your Full<br />
                    <span style={{fontStyle:"italic"}} className="text-[#e8c4b8]">Pregnancy Journey</span>
                  </h2>
                  <p className="ff-body text-lg text-white/65 mb-10 leading-relaxed max-w-md mx-auto">
                    All 40 episodes, personalised to your due date. One video per week — entirely free.
                  </p>

                  {submitted ? (
                    <div className="bg-white/10 rounded-2xl p-10 border border-white/15">
                      <div className="w-14 h-14 rounded-full bg-[#2d6e6e] flex items-center justify-center mx-auto mb-5">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" className="w-7 h-7"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                      </div>
                      <h3 className="ff-display text-2xl font-medium text-white mb-2">You're in!</h3>
                      <p className="ff-body text-white/65">Check your inbox — your first episode is on its way.</p>
                    </div>
                  ) : (
                    <form onSubmit={e => { e.preventDefault(); setSubmitted(true); }} className="flex flex-col gap-4">
                      <div className="flex flex-col sm:flex-row gap-3">
                        <div className="flex-1">
                          <label htmlFor="email-main" className="sr-only">Email address</label>
                          <input id="email-main" type="email" required autoComplete="email" placeholder="your@email.com" value={email} onChange={e => setEmail(e.target.value)}
                            className="focus-warm w-full h-14 px-6 rounded-full bg-white/10 border border-white/20 text-white ff-body text-base placeholder-white/38 focus:outline-none focus:border-[#c4785a] transition-all duration-200" />
                        </div>
                        <div>
                          <label htmlFor="due-date" className="sr-only">Due date (optional)</label>
                          <input id="due-date" type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                            className="focus-warm h-14 w-full sm:w-auto px-6 rounded-full bg-white/10 border border-white/20 text-white ff-body text-base focus:outline-none focus:border-[#c4785a] transition-all duration-200 cursor-pointer" />
                        </div>
                      </div>
                      <button type="submit" className="focus-warm h-14 px-8 rounded-full bg-[#c4785a] text-white ff-body font-semibold text-base hover:bg-[#b36849] transition-all duration-200 shadow-xl cursor-pointer">
                        Unlock My Journey — It's Free
                      </button>
                      <p className="ff-body text-sm text-white/42">No spam, just your weekly video. Unsubscribe anytime.</p>
                    </form>
                  )}

                  <div className="mt-9 flex items-center justify-center gap-3">
                    <div className="flex -space-x-2.5" aria-hidden="true">
                      {["#c4785a","#2d6e6e","#b5852a","#7a5a70","#c4785a"].map((col,i) => (
                        <div key={i} className="w-8 h-8 rounded-full border-2 border-[#1a2e2e] flex items-center justify-center text-white ff-body text-[11px] font-bold" style={{background:col}}>
                          {["S","A","M","R","L"][i]}
                        </div>
                      ))}
                    </div>
                    <p className="ff-body text-sm text-white/55">Join <span className="text-white font-semibold">2,000+ mothers</span> already on their journey</p>
                  </div>
                </div>
              </div>
            </section>

            {/* §5 FEATURES */}
            <section className="py-24 px-6 bg-[#fdf8f3]">
              <div className="max-w-6xl mx-auto">
                <div id="feat-head" data-animate className={anim("feat-head","text-center mb-16")}>
                  <p className="ff-body text-xs font-semibold tracking-[0.22em] uppercase text-[#c4785a] mb-3">Why 40 Weeks</p>
                  <h2 className="ff-display text-3xl md:text-5xl font-medium text-[#2c2c2c]">Everything You Need,<br />Nothing You Don't</h2>
                </div>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
                  {features.map((f,i) => (
                    <div key={i} id={`feat-${i}`} data-animate className={anim(`feat-${i}`,"group p-7 rounded-2xl bg-white border border-[#f0e8e4] hover:border-[#c4785a]/25 hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 cursor-default")} style={{transitionDelay:`${i*80}ms`}}>
                      <div className="w-12 h-12 rounded-xl bg-[#fdf0e8] flex items-center justify-center text-[#c4785a] mb-5 group-hover:bg-[#c4785a] group-hover:text-white transition-all duration-300">{f.icon}</div>
                      <h3 className="ff-display text-xl font-medium text-[#2c2c2c] mb-3 leading-snug">{f.title}</h3>
                      <p className="ff-body text-sm text-[#5a4a44] leading-relaxed">{f.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* §6 TRIMESTER BREAKDOWN */}
            <section className="py-24 px-6 bg-white">
              <div className="max-w-6xl mx-auto">
                <div id="trim-head" data-animate className={anim("trim-head","text-center mb-16")}>
                  <p className="ff-body text-xs font-semibold tracking-[0.22em] uppercase text-[#2d6e6e] mb-3">Your Roadmap</p>
                  <h2 className="ff-display text-3xl md:text-5xl font-medium text-[#2c2c2c]">Three Chapters of Wonder</h2>
                </div>
                <div className="grid md:grid-cols-3 gap-6">
                  {[
                    {t:1,acc:"#c4785a",bg:"linear-gradient(145deg,#fff5f2,#fde8df)",bdr:"#f5d0c4",desc:"The quiet miracle of the beginning — cells becoming a being.",topics:["Baby's heartbeat begins","Morning sickness & nutrition","First scan preparation","Emotional landscape of T1"]},
                    {t:2,acc:"#b5852a",bg:"linear-gradient(145deg,#fffbf2,#fdefd8)",bdr:"#f5dcaa",desc:"The golden season — energy returns, baby makes their presence known.",topics:["Anatomy scan & gender reveal","Baby kicks & movement","Growing your baby's brain","Birth plan beginnings"]},
                    {t:3,acc:"#2d6e6e",bg:"linear-gradient(145deg,#f0f9f9,#e0f2f2)",bdr:"#a8d8d8",desc:"The final approach — preparing body, home and heart for arrival.",topics:["Hospital bag essentials","Labor & birth education","Newborn care basics","Partner preparation"]},
                  ].map(({t,acc,bg,bdr,desc,topics},i) => (
                    <div key={t} id={`trim-${i}`} data-animate className={anim(`trim-${i}`,"relative rounded-3xl p-8 overflow-hidden border hover:-translate-y-1.5 hover:shadow-xl transition-all duration-300 cursor-default")} style={{background:bg,borderColor:bdr,transitionDelay:`${i*120}ms`}}>
                      <div className="absolute -top-10 -right-10 w-36 h-36 rounded-full opacity-[0.12]" style={{background:acc}} aria-hidden="true" />
                      <div className="relative z-10">
                        <span className="ff-display text-6xl font-semibold leading-none opacity-[0.12]" style={{color:acc}}>T{t}</span>
                        <h3 className="ff-display text-2xl font-medium text-[#2c2c2c] mt-2 mb-1">{T[t].label}</h3>
                        <p className="ff-body text-sm font-semibold mb-5" style={{color:acc}}>{T[t].weeks}</p>
                        <p className="ff-body text-sm text-[#5a4a44] mb-6 leading-relaxed italic">"{desc}"</p>
                        <ul className="space-y-2 mb-8">
                          {topics.map((topic,j) => (
                            <li key={j} className="flex items-start gap-2.5">
                              <span className="mt-2 w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:acc}} aria-hidden="true" />
                              <span className="ff-body text-sm text-[#2c2c2c]">{topic}</span>
                            </li>
                          ))}
                        </ul>
                        <button onClick={() => scrollTo("email-capture")} className="focus-warm min-h-[44px] px-7 py-2.5 rounded-full ff-body text-sm font-semibold text-white hover:opacity-88 transition-all duration-200 cursor-pointer shadow-md" style={{background:acc}}>
                          Preview Episodes &rarr;
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* §7 FOOTER + TESTIMONIALS */}
            <section className="py-24 px-6 bg-[#fdf8f3] border-t border-[#f0e8e4]">
              <div className="max-w-5xl mx-auto">

                <div id="testimonials" data-animate className={anim("testimonials","mb-20")}>
                  <p className="ff-body text-xs font-semibold tracking-[0.22em] uppercase text-[#c4785a] text-center mb-12">What Mothers Say</p>
                  <div className="grid md:grid-cols-3 gap-6">
                    {testimonials.map((tm,i) => (
                      <figure key={i} className="flex flex-col p-7 rounded-2xl bg-white border border-[#f0e8e4] hover:shadow-lg transition-shadow duration-300">
                        <div className="ff-display text-5xl leading-none mb-4" style={{color:tm.color,opacity:0.35}}>"</div>
                        <blockquote className="ff-body text-base text-[#2c2c2c] leading-relaxed flex-1 mb-6">{tm.quote}</blockquote>
                        <figcaption className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-full flex items-center justify-center text-white ff-body text-xs font-bold flex-shrink-0" style={{background:tm.color}}>{tm.initials}</div>
                          <div>
                            <p className="ff-body text-sm font-semibold text-[#2c2c2c]">{tm.name}</p>
                            <p className="ff-body text-xs text-[#9a8a85]">{tm.detail}</p>
                          </div>
                        </figcaption>
                      </figure>
                    ))}
                  </div>
                </div>

                <div id="footer-cap" data-animate className={anim("footer-cap","text-center mt-20 mb-20")}>
                  <h2 className="ff-display text-3xl md:text-[2.75rem] font-medium text-[#2c2c2c] mb-4 leading-tight">
                    Your journey starts with<br />
                    <span style={{fontStyle:"italic"}} className="text-[#c4785a]">one simple step</span>
                  </h2>
                  <p className="ff-body text-base text-[#5a4a44] mb-9 max-w-sm mx-auto leading-relaxed">Enter your email to unlock your first 4 episodes — completely free.</p>
                  {footerSubmitted ? (
                    <div className="inline-flex items-center gap-3 px-8 py-4 rounded-2xl bg-[#f0f9f9] border border-[#a8d8d8]">
                      <svg viewBox="0 0 24 24" fill="none" stroke="#2d6e6e" strokeWidth="2.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                      <span className="ff-body font-semibold text-[#2d6e6e]">You're on the journey!</span>
                    </div>
                  ) : (
                    <form onSubmit={e => { e.preventDefault(); setFooterSubmitted(true); }} className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                      <div className="flex-1">
                        <label htmlFor="footer-email" className="sr-only">Email address</label>
                        <input id="footer-email" type="email" required autoComplete="email" placeholder="your@email.com" value={footerEmail} onChange={e => setFooterEmail(e.target.value)}
                          className="focus-warm w-full h-14 px-6 rounded-full border-2 border-[#e8ddd8] bg-white ff-body text-base text-[#2c2c2c] placeholder-[#bab0ab] focus:outline-none focus:border-[#c4785a] transition-colors duration-200" />
                      </div>
                      <button type="submit" className="focus-warm h-14 px-9 rounded-full bg-[#c4785a] text-white ff-body font-semibold text-base hover:bg-[#b36849] transition-all duration-200 shadow-lg cursor-pointer whitespace-nowrap">
                        Start Free &rarr;
                      </button>
                    </form>
                  )}
                  <p className="ff-body text-xs text-[#bab0ab] mt-4">No spam. No credit card. Unsubscribe anytime.</p>
                </div>

                <footer className="pt-10 border-t border-[#f0e8e4] flex flex-col md:flex-row items-center justify-between gap-6">
                  <div>
                    <p className="ff-display text-xl font-medium text-[#2c2c2c]">40 Weeks of Wonder</p>
                    <p className="ff-body text-sm text-[#9a8a85] mt-1">A guided companion for every week of your pregnancy.</p>
                  </div>
                  <nav className="flex flex-wrap items-center gap-1">
                    {["About","Privacy","Terms","Contact"].map(link => (
                      <button key={link} className="focus-warm min-h-[44px] px-3 ff-body text-sm text-[#9a8a85] hover:text-[#c4785a] transition-colors duration-200 cursor-pointer rounded">{link}</button>
                    ))}
                  </nav>
                  <p className="ff-body text-xs text-[#c8bfba]">Made with care &copy; 2026</p>
                </footer>
              </div>
            </section>

          </main>
        </>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<FortyWeeksOfWonder />);
  </script>
</body>
</html>
